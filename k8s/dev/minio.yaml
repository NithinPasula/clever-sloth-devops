# MinIO (S3-compatible object storage) for issue attachments.
# Three objects: PVC, Deployment, Service.
# The Secret it depends on (minio-secret) lives in k8s/dev/secrets/ and is
# gitignored — apply that first:
#   kubectl apply -f k8s/dev/secrets/  &&  kubectl apply -f k8s/dev/minio.yaml

# ---------------------------------------------------------------------------
# 1) PVC — here we declare the PersistentVolumeClaim as its OWN object (unlike
#    Postgres, where the StatefulSet's volumeClaimTemplate created it for us).
#    This is the more explicit way to ask for persistent disk.
# ---------------------------------------------------------------------------
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: minio-data
  namespace: clever-sloth-dev
spec:
  accessModes: ["ReadWriteOnce"]    # RWO = mountable by a single node at a time
  resources:
    requests:
      storage: 2Gi
---
# ---------------------------------------------------------------------------
# 2) Deployment — note `strategy: Recreate`. An RWO volume can only be attached
#    to ONE pod at a time. The default rolling update briefly runs old+new pods
#    together, which would deadlock on the volume. Recreate stops the old pod
#    BEFORE starting the new one. (Trade-off: a brief downtime on each update —
#    acceptable for single-node storage like this.)
# ---------------------------------------------------------------------------
apiVersion: apps/v1
kind: Deployment
metadata:
  name: minio
  namespace: clever-sloth-dev
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: minio
  template:
    metadata:
      labels:
        app: minio
    spec:
      containers:
        - name: minio
          image: minio/minio:latest
          args: ["server", "/data", "--console-address", ":9001"]
          ports:
            - name: s3
              containerPort: 9000     # S3 API (the app talks here)
            - name: console
              containerPort: 9001     # web console (humans)
          envFrom:
            - secretRef:
                name: minio-secret
          volumeMounts:
            - name: data
              mountPath: /data
          # httpGet probes — MinIO exposes dedicated health endpoints.
          readinessProbe:
            httpGet:
              path: /minio/health/ready
              port: 9000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /minio/health/live
              port: 9000
            initialDelaySeconds: 10
            periodSeconds: 15
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              memory: 512Mi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: minio-data       # binds the PVC declared above
---
# ---------------------------------------------------------------------------
# 3) Service — exposes both ports inside the cluster. The API reaches the S3
#    API at host `minio` port 9000.
# ---------------------------------------------------------------------------
apiVersion: v1
kind: Service
metadata:
  name: minio
  namespace: clever-sloth-dev
  labels:
    app: minio
spec:
  selector:
    app: minio
  ports:
    - name: s3
      port: 9000
      targetPort: 9000
    - name: console
      port: 9001
      targetPort: 9001
