# NetworkPolicies for clever-sloth-dev — least-privilege pod firewalling.
#
# Kubernetes is allow-all by default. These policies flip that to DEFAULT-DENY
# for INGRESS (incoming) traffic, then re-open ONLY the real paths the app uses.
# Egress (outgoing) is intentionally left open on this first pass so DNS and
# outbound calls keep working — locking egress down is a separate hardening step.
#
# Reminder: NetworkPolicy is STATEFUL — reply traffic on an established
# connection is always allowed, so we only declare the direction that INITIATES.
#
# Apply:   kubectl apply -f k8s/dev/networkpolicies.yaml
# Undo:    kubectl delete -f k8s/dev/networkpolicies.yaml
---
# 1) DEFAULT DENY (ingress) — selects EVERY pod in the namespace ({} = all) and,
#    because it lists Ingress in policyTypes but has NO ingress rules, denies all
#    incoming traffic. The allow policies below poke specific holes back open.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-ingress
  namespace: clever-sloth-dev
spec:
  podSelector: {}
  policyTypes:
    - Ingress
---
# 2) web ← ingress-nginx (:3000). The browser reaches the frontend only through
#    the ingress controller, never pod-to-pod.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-web-from-ingress
  namespace: clever-sloth-dev
spec:
  podSelector:
    matchLabels:
      app: web
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
      ports:
        - protocol: TCP
          port: 3000
---
# 3) api ← ingress-nginx (browser API + WebSocket) AND ← monitoring (Prometheus
#    scraping /metrics). Both target the same port 8080.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-api-ingress
  namespace: clever-sloth-dev
spec:
  podSelector:
    matchLabels:
      app: api
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - protocol: TCP
          port: 8080
---
# 4) postgres ← api only (:5432). No one else in the cluster may reach the DB.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-postgres-from-api
  namespace: clever-sloth-dev
spec:
  podSelector:
    matchLabels:
      app: postgres
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: api
      ports:
        - protocol: TCP
          port: 5432
---
# 5) redis ← api only (:6379).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-redis-from-api
  namespace: clever-sloth-dev
spec:
  podSelector:
    matchLabels:
      app: redis
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: api
      ports:
        - protocol: TCP
          port: 6379
---
# 6) minio ← api (internal bucket ops) AND ← ingress-nginx (browser fetches
#    presigned URLs over the minio.clever-sloth.local ingress). Both on :9000.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-minio-ingress
  namespace: clever-sloth-dev
spec:
  podSelector:
    matchLabels:
      app: minio
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: api
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
      ports:
        - protocol: TCP
          port: 9000
