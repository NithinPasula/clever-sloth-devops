# API — ConfigMap (non-secret) + Secret (sensitive) + Deployment + Service.
apiVersion: v1
kind: ConfigMap
metadata:
  name: api-config
  namespace: {{ .Release.Namespace }}
  labels:
    app: api
    {{- include "clever-sloth.labels" . | nindent 4 }}
data:
  APP_ENV: {{ .Values.api.config.appEnv | quote }}
  PORT: "8080"
  LOG_LEVEL: {{ .Values.api.config.logLevel | quote }}
  REDIS_URL: "redis://redis:6379/0"
  # The API talks to MinIO over the INTERNAL service (private, http) for bucket
  # ops, but signs presigned URLs against the PUBLIC ingress host (https) so the
  # browser's request matches the signature with no mixed content.
  MINIO_ENDPOINT: "minio:9000"
  MINIO_USE_SSL: {{ .Values.api.config.minioUseSSL | quote }}
  MINIO_PUBLIC_ENDPOINT: {{ .Values.ingress.minioHost | quote }}
  MINIO_PUBLIC_USE_SSL: {{ .Values.ingress.minioPublicUseSSL | quote }}
  MINIO_BUCKET: {{ .Values.api.config.minioBucket | quote }}
---
{{- if .Values.secrets.create }}
apiVersion: v1
kind: Secret
metadata:
  name: api-secret
  namespace: {{ .Release.Namespace }}
  labels:
    app: api
    {{- include "clever-sloth.labels" . | nindent 4 }}
type: Opaque
stringData:
  # Assembled from the postgres values — single source of truth for the password.
  DATABASE_URL: "postgres://{{ .Values.postgres.user }}:{{ .Values.postgres.password }}@postgres:5432/{{ .Values.postgres.database }}?sslmode=disable"
  JWT_SECRET: {{ .Values.api.jwtSecret | quote }}
  # API's S3 credentials = MinIO's root credentials.
  MINIO_ACCESS_KEY: {{ .Values.minio.rootUser | quote }}
  MINIO_SECRET_KEY: {{ .Values.minio.rootPassword | quote }}
---
{{- end }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: {{ .Release.Namespace }}
  labels:
    app: api
    {{- include "clever-sloth.labels" . | nindent 4 }}
spec:
  # When autoscaling is on, the HPA owns the replica count — declaring it here too
  # would let every reconcile (ArgoCD/Helm) reset it and fight the HPA. So we omit
  # replicas in that case and let the HPA be the single source of truth.
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.api.replicas }}
  {{- end }}
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      containers:
        - name: api
          image: {{ .Values.api.image }}
          imagePullPolicy: {{ .Values.api.imagePullPolicy }}
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: api-config
            - secretRef:
                name: api-secret
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 15
          resources:
            {{- toYaml .Values.api.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: {{ .Release.Namespace }}
  labels:
    app: api
    {{- include "clever-sloth.labels" . | nindent 4 }}
spec:
  selector:
    app: api
  ports:
    - name: http
      port: 8080
      targetPort: 8080
