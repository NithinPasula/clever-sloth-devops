{{- if .Values.networkPolicy.enabled }}
# NetworkPolicies — least-privilege pod firewalling for the app namespace.
# Kubernetes is allow-all by default; these flip INGRESS to default-deny and
# re-open only the real paths. Egress is left open (DNS-safe) — locking egress
# down is a separate hardening step. NetworkPolicy is stateful, so reply traffic
# on an established connection is always allowed.
#
# Toggle with networkPolicy.enabled. External namespaces are configurable so the
# same chart works if your ingress/monitoring namespaces are named differently.
---
# 1) DEFAULT DENY (ingress) for every pod in the namespace.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-ingress
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "clever-sloth.labels" . | nindent 4 }}
spec:
  podSelector: {}
  policyTypes:
    - Ingress
---
# 2) web <- ingress-nginx (:3000)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-web-from-ingress
  namespace: {{ .Release.Namespace }}
  labels:
    app: web
    {{- include "clever-sloth.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      app: web
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.networkPolicy.ingressNamespace }}
      ports:
        - protocol: TCP
          port: 3000
---
# 3) api <- ingress-nginx (browser + WebSocket) AND monitoring (Prometheus scrape), both :8080
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-api-ingress
  namespace: {{ .Release.Namespace }}
  labels:
    app: api
    {{- include "clever-sloth.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      app: api
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.networkPolicy.ingressNamespace }}
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.networkPolicy.monitoringNamespace }}
      ports:
        - protocol: TCP
          port: 8080
---
# 4) postgres <- api only (:5432)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-postgres-from-api
  namespace: {{ .Release.Namespace }}
  labels:
    app: postgres
    {{- include "clever-sloth.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      app: postgres
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: api
      ports:
        - protocol: TCP
          port: 5432
---
# 5) redis <- api only (:6379)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-redis-from-api
  namespace: {{ .Release.Namespace }}
  labels:
    app: redis
    {{- include "clever-sloth.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      app: redis
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: api
      ports:
        - protocol: TCP
          port: 6379
---
# 6) minio <- api (internal ops) AND ingress-nginx (browser presigned URLs), :9000
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-minio-ingress
  namespace: {{ .Release.Namespace }}
  labels:
    app: minio
    {{- include "clever-sloth.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      app: minio
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: api
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.networkPolicy.ingressNamespace }}
      ports:
        - protocol: TCP
          port: 9000
{{- end }}
