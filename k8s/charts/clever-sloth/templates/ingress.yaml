# Ingress — the front door. Two Ingress objects: the app + MinIO.
# The clusterIssuer it names is bootstrapped once via k8s/dev/tls.yaml; this
# chart only references it.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: clever-sloth
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "clever-sloth.labels" . | nindent 4 }}
  annotations:
    cert-manager.io/cluster-issuer: {{ .Values.ingress.clusterIssuer }}
    # When false, nginx serves the app over plain http without redirecting to
    # https (avoids mixed-content while the web bundle calls an http API URL).
    nginx.ingress.kubernetes.io/ssl-redirect: {{ .Values.ingress.sslRedirect | quote }}
spec:
  ingressClassName: {{ .Values.ingress.className }}
  tls:
    - hosts:
        - {{ .Values.ingress.appHost }}
      secretName: {{ .Values.ingress.tlsSecretName }}
  rules:
    - host: {{ .Values.ingress.appHost }}
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: api
                port:
                  number: 8080
          - path: /
            pathType: Prefix
            backend:
              service:
                name: web
                port:
                  number: 3000
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: minio
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "clever-sloth.labels" . | nindent 4 }}
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "0"   # remove 1 MB upload cap
spec:
  ingressClassName: {{ .Values.ingress.className }}
  rules:
    - host: {{ .Values.ingress.minioHost }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: minio
                port:
                  number: 9000
