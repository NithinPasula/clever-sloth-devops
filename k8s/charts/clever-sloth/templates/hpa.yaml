{{- if .Values.autoscaling.enabled }}
# HorizontalPodAutoscaler for the API — scales replicas on CPU utilization.
# Requires metrics-server and CPU *requests* on the api container (utilization is
# measured as a % of the request). The api Deployment omits a static `replicas`
# when autoscaling is enabled, so this HPA is the sole owner of the count.
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: api
  namespace: {{ .Release.Namespace }}
  labels:
    app: api
    {{- include "clever-sloth.labels" . | nindent 4 }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: api
  minReplicas: {{ .Values.autoscaling.minReplicas }}
  maxReplicas: {{ .Values.autoscaling.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.autoscaling.targetCPUUtilizationPercentage }}
  behavior:
    # Scale up quickly, scale down calmly — avoids "flapping" when load is spiky.
    scaleUp:
      stabilizationWindowSeconds: 0
    scaleDown:
      stabilizationWindowSeconds: 120
{{- end }}
