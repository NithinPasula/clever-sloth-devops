# values.yaml — the single place where every tunable knob lives.
# Templates read these via {{ .Values.<path> }}.
#
# SECRETS: the password / secret / key fields below are PLACEHOLDERS (CHANGE_ME).
# Real credentials go in values.local.yaml (gitignored) and are merged at
# install time with:  helm install ... -f values.local.yaml
# That keeps real secrets out of git while this file stays safe to commit.

# ----------------------------------------------------------------------------
# Secrets strategy.
#   create: false (default) -> the chart renders NO Secrets; they're managed
#                    out-of-band as SealedSecrets (committed encrypted, decrypted
#                    by the in-cluster controller). This is the source of truth:
#                      kubectl apply -f k8s/dev/secrets/<name>-sealed.yaml
#   create: true  -> opt-in fallback: the chart renders plaintext Secret objects
#                    from the values below (needs values.local.yaml for real
#                    values). Enable with:  --set secrets.create=true
# ----------------------------------------------------------------------------
secrets:
  create: false

# ----------------------------------------------------------------------------
# Postgres — primary database (StatefulSet + headless Service + Secret).
# ----------------------------------------------------------------------------
postgres:
  image: postgres:16-alpine
  storage: 1Gi              # size of the PersistentVolumeClaim
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      memory: 256Mi
  database: cleversloth     # non-secret: the DB name
  # --- secret (override in values.local.yaml) ---
  user: postgres
  password: CHANGE_ME

# ----------------------------------------------------------------------------
# Redis — cache / pub-sub (stateless Deployment + Service, no volume).
# ----------------------------------------------------------------------------
redis:
  image: redis:7-alpine
  resources:
    requests:
      cpu: 25m
      memory: 32Mi
    limits:
      memory: 128Mi

# ----------------------------------------------------------------------------
# MinIO — S3-compatible object storage for attachments (PVC + Deployment + Service + Secret).
# ----------------------------------------------------------------------------
minio:
  image: minio/minio:latest
  storage: 2Gi
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      memory: 512Mi
  # --- secret (override in values.local.yaml) ---
  rootUser: minioadmin
  rootPassword: CHANGE_ME

# ----------------------------------------------------------------------------
# API — Go backend (ConfigMap + Secret + Deployment + Service).
# ----------------------------------------------------------------------------
api:
  image: clever-sloth-api:dev
  imagePullPolicy: IfNotPresent   # use the locally-imported image, don't pull
  replicas: 1
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      memory: 256Mi
  config:
    appEnv: development
    logLevel: info
    minioBucket: attachments
    # SSL for the API's INTERNAL connection to MinIO (minio:9000) — stays http.
    minioUseSSL: "false"
  # --- secret (override in values.local.yaml) ---
  jwtSecret: CHANGE_ME

# ----------------------------------------------------------------------------
# Web — Next.js standalone front-end (Deployment + Service).
# ----------------------------------------------------------------------------
web:
  image: clever-sloth-web:dev
  imagePullPolicy: IfNotPresent
  replicas: 1
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      memory: 256Mi

# ----------------------------------------------------------------------------
# ServiceMonitor — tells the Prometheus Operator to scrape the API's /metrics.
# Requires the kube-prometheus-stack CRDs (installed in Phase 5). Set enabled
# to false when deploying to a cluster WITHOUT the Prometheus Operator, or the
# install fails on the unknown ServiceMonitor kind.
# ----------------------------------------------------------------------------
serviceMonitor:
  enabled: true
  path: /metrics
  interval: 30s

# ----------------------------------------------------------------------------
# Ingress — routing + TLS. The clusterIssuer is bootstrapped once (k8s/dev/tls.yaml),
# this chart only references it by name.
# ----------------------------------------------------------------------------
ingress:
  className: nginx
  clusterIssuer: clever-sloth-ca
  appHost: clever-sloth.local
  tlsSecretName: clever-sloth-tls
  # MinIO is exposed on its own host with its own TLS cert, so the browser fetches
  # presigned URLs over HTTPS (no mixed content). minioPublicUseSSL drives the
  # scheme the API signs those URLs with — must match the ingress (https => true).
  minioHost: minio.clever-sloth.local
  minioTlsSecretName: minio-tls
  minioPublicUseSSL: "true"
  # Web is now built with an https API URL, so we force http->https everywhere.
  sslRedirect: true

# ----------------------------------------------------------------------------
# NetworkPolicy — least-privilege pod firewalling (templates/networkpolicy.yaml).
# Default-deny INGRESS for the namespace, then allow only the real paths:
#   web  <- ingress            api    <- ingress + monitoring
#   postgres/redis <- api      minio  <- api + ingress
# Egress is left open (DNS-safe). Requires a CNI that enforces NetworkPolicy
# (k3s does, in-process). ingressNamespace/monitoringNamespace let the external
# namespace names be overridden per cluster.
# ----------------------------------------------------------------------------
networkPolicy:
  enabled: true
  ingressNamespace: ingress-nginx
  monitoringNamespace: monitoring
