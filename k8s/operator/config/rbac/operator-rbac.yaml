# RBAC for the operator itself, for when it runs IN the cluster as a Deployment.
# (For local `go run` testing it uses your kubeconfig, so this isn't needed yet.)
# The operator provisions namespaces, RBAC, and NetworkPolicies, so it needs
# cluster-wide permission on exactly those — nothing more (least privilege).
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: clever-sloth-operator
  namespace: clever-sloth-operator
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: clever-sloth-operator
rules:
  - apiGroups: ["platform.cleversloth.io"]
    resources: ["cleverslothprojects"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["platform.cleversloth.io"]
    resources: ["cleverslothprojects/status"]
    verbs: ["get", "update", "patch"]
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["rbac.authorization.k8s.io"]
    resources: ["roles", "rolebindings"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["networkpolicies"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: clever-sloth-operator
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: clever-sloth-operator
subjects:
  - kind: ServiceAccount
    name: clever-sloth-operator
    namespace: clever-sloth-operator
